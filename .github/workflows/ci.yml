name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Provide empty env vars so the build doesn't fail on missing addresses
          NEXT_PUBLIC_WAXON_ADDRESS: ""
          NEXT_PUBLIC_FACTORY_ADDRESS: ""
          NEXT_PUBLIC_SWAP_ROUTER_ADDRESS: ""
          NEXT_PUBLIC_POSITION_MANAGER_ADDRESS: ""
          NEXT_PUBLIC_QUOTER_ADDRESS: ""
          NEXT_PUBLIC_QUOTER_V2_ADDRESS: ""
          NEXT_PUBLIC_TICK_LENS_ADDRESS: ""
          NEXT_PUBLIC_MULTICALL_ADDRESS: ""

  contracts:
    name: Contracts — Compile & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test
